<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Screener — Binance Futures</title>
<style>
:root {
  --bg:#0b0e14; --surface:#131720; --border:#1e2535;
  --text:#d1d5db; --muted:#6b7280; --accent:#3b82f6;
  --se:#7f1d1d; --se-t:#fca5a5;
  --sf:#991b1b; --sf-t:#fca5a5;
  --sh:#b91c1c; --sh-t:#fecaca;
  --sw:#450a0a; --sw-t:#f87171;
  --le:#14532d; --le-t:#86efac;
  --lf:#166534; --lf-t:#86efac;
  --lo:#15803d; --lo-t:#bbf7d0;
  --lw:#052e16; --lw-t:#6ee7b7;
  --n:#1e2535;  --n-t:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:700;color:#f9fafb}
header h1 span{color:var(--accent)}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto}
select,button{background:#1e2535;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#2563eb}
button.primary:disabled{background:#374151;border-color:#374151;cursor:not-allowed}
.last-update{color:var(--muted);font-size:12px}
#progress-bar-wrap{height:3px;background:var(--border);display:none}
#progress-bar{height:3px;background:var(--accent);width:0%;transition:width .2s}
.stats{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat-pill{padding:4px 12px;border-radius:20px;font-weight:600;font-size:12px;cursor:pointer;border:1px solid transparent;user-select:none}
.stat-pill:hover{opacity:.85}
.stat-pill.active{border-color:#fff3}
.pill-all{background:#374151;color:#e5e7eb}
.pill-short{background:#7f1d1d;color:#fca5a5}
.pill-long{background:#14532d;color:#86efac}
.pill-n{background:#1e2535;color:#9ca3af}
.toolbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border)}
#search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 12px;font-size:13px;width:220px}
#search-box::placeholder{color:var(--muted)}
.count-label{color:var(--muted);font-size:12px;margin-left:auto}
#status-msg{padding:40px;text-align:center;color:var(--muted);font-size:15px}
#status-msg .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 225px)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:#0d1117;position:sticky;top:0;z-index:2;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted-asc::after{content:" ▲";color:var(--accent)}
thead th.sorted-desc::after{content:" ▼";color:var(--accent)}
.col-symbol{width:110px}.col-price{width:100px}.col-chg{width:72px}
.col-score{width:62px}.col-signal{width:130px}.col-rsi{width:62px}
.col-srsi{width:72px}.col-bb{width:65px}.col-ema{width:80px}
.col-vol{width:65px}.col-details{width:auto}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
tbody tr:hover{filter:brightness(1.25)}
tbody td{padding:7px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr.se{background:var(--se);color:var(--se-t)} tr.sf{background:var(--sf);color:var(--sf-t)}
tr.sh{background:var(--sh);color:var(--sh-t)} tr.sw{background:var(--sw);color:var(--sw-t)}
tr.le{background:var(--le);color:var(--le-t)} tr.lf{background:var(--lf);color:var(--lf-t)}
tr.lo{background:var(--lo);color:var(--lo-t)} tr.lw{background:var(--lw);color:var(--lw-t)}
tr.n{background:var(--n);color:var(--n-t)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px;background:rgba(0,0,0,.3);color:inherit}
.sym-link{color:inherit;text-decoration:none;font-weight:700}
.sym-link:hover{text-decoration:underline}
td.pos{color:#4ade80} td.neg{color:#f87171}
tr.sh td.pos,tr.sf td.pos,tr.se td.pos{color:#fbbf24}
tr.lo td.pos,tr.lf td.pos,tr.le td.pos{color:#34d399}
.details-row{display:none}
.details-row td{padding:5px 12px 8px 30px;font-size:12px;opacity:.8;white-space:normal;word-break:break-word}
.ema-up{color:#4ade80;font-weight:600} .ema-down{color:#f87171;font-weight:600}
.rsi-bar{width:38px;height:4px;background:#374151;border-radius:2px;display:inline-block;vertical-align:middle;margin-left:4px;overflow:hidden}
.rsi-fill{height:100%;border-radius:2px}
</style>
</head>
<body>

<header>
  <h1>Crypto <span>Screener</span> — Binance Futures</h1>
  <div class="controls">
    <label style="color:var(--muted);font-size:12px">Temporalidad:</label>
    <select id="interval-sel">
      <option value="15m">15 minutos</option>
      <option value="1h" selected>1 hora</option>
      <option value="4h">4 horas</option>
      <option value="1d">Diario</option>
    </select>
    <button class="primary" id="scan-btn" onclick="startScan()">▶ Escanear</button>
    <span class="last-update" id="last-update"></span>
  </div>
</header>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div class="stats" id="stats-bar">
  <span class="stat-pill pill-all active" data-filter="all"     onclick="setFilter(this)">TODOS: 0</span>
  <span class="stat-pill pill-short"      data-filter="short"   onclick="setFilter(this)">SHORT: 0</span>
  <span class="stat-pill pill-long"       data-filter="long"    onclick="setFilter(this)">LONG: 0</span>
  <span class="stat-pill pill-n"          data-filter="neutral" onclick="setFilter(this)">NEUTRAL: 0</span>
</div>

<div class="toolbar">
  <input id="search-box" type="text" placeholder="Buscar símbolo… (ej: BTC, ETH)" oninput="applyFilters()">
  <span class="count-label" id="count-label">0 resultados</span>
</div>

<div id="status-msg">Presioná <strong>Escanear</strong> para analizar todos los futuros de Binance.</div>

<div class="table-wrap" id="table-wrap" style="display:none">
  <table id="main-table">
    <thead>
      <tr>
        <th class="col-symbol"  onclick="sortBy('symbol')">Símbolo</th>
        <th class="col-price"   onclick="sortBy('price')">Precio</th>
        <th class="col-chg"     onclick="sortBy('chg24h')">24h %</th>
        <th class="col-score"   onclick="sortBy('score')">Score</th>
        <th class="col-signal"  onclick="sortBy('signal')">Señal</th>
        <th class="col-rsi"     onclick="sortBy('rsi')">RSI</th>
        <th class="col-srsi"    onclick="sortBy('srsi')">StochRSI</th>
        <th class="col-bb"      onclick="sortBy('bb_pct')">BB %</th>
        <th class="col-ema"     onclick="sortBy('ema_trend')">EMA</th>
        <th class="col-vol"     onclick="sortBy('vol_ratio')">Vol×</th>
        <th class="col-details">Indicadores</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────────
const BINANCE = "https://fapi.binance.com";
let allData = [], filtered = [], sortKey = "score", sortAsc = true, activeFilter = "all", running = false;

// ── Math ───────────────────────────────────────────────────────────────────────
function wilderEMA(arr, period) {
  if (arr.length < period) return NaN;
  let val = arr.slice(0, period).reduce((a, b) => a + b) / period;
  const alpha = 1 / period;
  for (let i = period; i < arr.length; i++) val = val * (1 - alpha) + arr[i] * alpha;
  return val;
}

function stdEMA(arr, period) {
  if (arr.length < period) return NaN;
  const alpha = 2 / (period + 1);
  let val = arr.slice(0, period).reduce((a, b) => a + b) / period;
  for (let i = period; i < arr.length; i++) val = arr[i] * alpha + val * (1 - alpha);
  return val;
}

function stdEMAFull(arr, period) {
  if (arr.length < period) return arr.map(() => NaN);
  const alpha = 2 / (period + 1);
  const out = new Array(period - 1).fill(NaN);
  let val = arr.slice(0, period).reduce((a, b) => a + b) / period;
  out.push(val);
  for (let i = period; i < arr.length; i++) { val = arr[i] * alpha + val * (1 - alpha); out.push(val); }
  return out;
}

// ── RSI ────────────────────────────────────────────────────────────────────────
function rsiSeries(closes, period = 14) {
  const gains = [], losses = [];
  for (let i = 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  if (gains.length < period) return [];
  const alpha = 1 / period;
  let ag = gains.slice(0, period).reduce((a, b) => a + b) / period;
  let al = losses.slice(0, period).reduce((a, b) => a + b) / period;
  const out = [al === 0 ? 100 : 100 - 100 / (1 + ag / al)];
  for (let i = period; i < gains.length; i++) {
    ag = ag * (1 - alpha) + gains[i] * alpha;
    al = al * (1 - alpha) + losses[i] * alpha;
    out.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
  }
  return out;
}

// ── Stochastic RSI ─────────────────────────────────────────────────────────────
function calcStochRSI(closes, rsiP = 14, stochP = 14, sk = 3) {
  const rs = rsiSeries(closes, rsiP);
  if (rs.length < stochP + sk) return 50;
  const raw = [];
  for (let i = stochP - 1; i < rs.length; i++) {
    const w = rs.slice(i - stochP + 1, i + 1);
    const lo = Math.min(...w), hi = Math.max(...w);
    raw.push(hi === lo ? 50 : (rs[i] - lo) / (hi - lo) * 100);
  }
  if (raw.length < sk) return 50;
  let kSmooth = 0;
  for (let i = raw.length - sk; i < raw.length; i++) kSmooth += raw[i];
  return kSmooth / sk;
}

// ── MACD ───────────────────────────────────────────────────────────────────────
function calcMACD(closes) {
  const fast = stdEMAFull(closes, 12);
  const slow = stdEMAFull(closes, 26);
  const macd = fast.map((v, i) => (isNaN(v) || isNaN(slow[i])) ? NaN : v - slow[i]);
  const valid = macd.filter(v => !isNaN(v));
  if (valid.length < 9) return { histCur: 0, histPrv: 0 };
  const sig = stdEMAFull(valid, 9);
  const hist = sig.map((v, i) => isNaN(v) ? NaN : valid[i] - v).filter(v => !isNaN(v));
  return {
    histCur: hist[hist.length - 1] ?? 0,
    histPrv: hist[hist.length - 2] ?? 0
  };
}

// ── Bollinger Bands %B ────────────────────────────────────────────────────────
function calcBB(closes, period = 20) {
  if (closes.length < period) return 50;
  const sl = closes.slice(-period);
  const mean = sl.reduce((a, b) => a + b) / period;
  const std = Math.sqrt(sl.reduce((s, v) => s + (v - mean) ** 2, 0) / period);
  const up = mean + 2 * std, lo = mean - 2 * std;
  const price = closes[closes.length - 1];
  return up === lo ? 50 : (price - lo) / (up - lo) * 100;
}

// ── ATR ────────────────────────────────────────────────────────────────────────
function calcATR(highs, lows, closes, period = 14) {
  const trs = [];
  for (let i = 1; i < closes.length; i++)
    trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1])));
  return wilderEMA(trs, period);
}

// ── Full analysis ─────────────────────────────────────────────────────────────
function analyzeKlines(symbol, klines) {
  if (!klines || klines.length < 60) return null;
  const closes  = klines.map(k => +k[4]);
  const highs   = klines.map(k => +k[2]);
  const lows    = klines.map(k => +k[3]);
  const volumes = klines.map(k => +k[5]);
  const price   = closes[closes.length - 1];

  const rsiVal  = rsiSeries(closes)[rsiSeries(closes).length - 1] ?? 50;
  const srsiVal = calcStochRSI(closes);
  const { histCur, histPrv } = calcMACD(closes);
  const bbPct   = calcBB(closes);
  const ema20   = stdEMA(closes, 20);
  const ema50   = stdEMA(closes, 50);
  const ema200  = stdEMA(closes, 200);
  const atrVal  = calcATR(highs, lows, closes);
  const atrPct  = isNaN(atrVal) ? 0 : atrVal / price * 100;

  const volArr  = volumes.slice(-20);
  const volAvg  = volArr.reduce((a, b) => a + b) / volArr.length;
  const volRatio = volumes[volumes.length - 1] / volAvg;

  const lb = Math.min(24, closes.length - 1);
  const chg24h = (price - closes[closes.length - 1 - lb]) / closes[closes.length - 1 - lb] * 100;

  // ── Score ──────────────────────────────────────────────────────────────────
  let score = 0;
  const sigs = [];

  if (rsiVal >= 80)      { score -= 2; sigs.push(`RSI ${rsiVal.toFixed(1)} extremo alto`); }
  else if (rsiVal >= 70) { score -= 1; sigs.push(`RSI ${rsiVal.toFixed(1)} sobrecompra`); }
  else if (rsiVal <= 20) { score += 2; sigs.push(`RSI ${rsiVal.toFixed(1)} extremo bajo`); }
  else if (rsiVal <= 30) { score += 1; sigs.push(`RSI ${rsiVal.toFixed(1)} sobreventa`); }
  else                   { sigs.push(`RSI ${rsiVal.toFixed(1)}`); }

  if (!isNaN(srsiVal)) {
    if (srsiVal >= 90)      { score -= 2; sigs.push(`StochRSI ${srsiVal.toFixed(1)} extremo alto`); }
    else if (srsiVal >= 80) { score -= 1; sigs.push(`StochRSI ${srsiVal.toFixed(1)} sobrecompra`); }
    else if (srsiVal <= 10) { score += 2; sigs.push(`StochRSI ${srsiVal.toFixed(1)} extremo bajo`); }
    else if (srsiVal <= 20) { score += 1; sigs.push(`StochRSI ${srsiVal.toFixed(1)} sobreventa`); }
    else                    { sigs.push(`StochRSI ${srsiVal.toFixed(1)}`); }
  }

  if      (histCur < 0 && histPrv >= 0)           { score -= 2; sigs.push("MACD cruce bajista"); }
  else if (histCur > 0 && histPrv <= 0)            { score += 2; sigs.push("MACD cruce alcista"); }
  else if (histCur < 0 && histCur < histPrv)       { score -= 1; sigs.push("MACD empeorando"); }
  else if (histCur > 0 && histCur > histPrv)       { score += 1; sigs.push("MACD mejorando"); }
  else if (histCur < 0) score -= 0.5;
  else                  score += 0.5;

  if      (bbPct > 100) { score -= 1; sigs.push(`BB ${bbPct.toFixed(0)}% sobre banda sup`); }
  else if (bbPct > 90)  { score -= 0.5; sigs.push(`BB ${bbPct.toFixed(0)}% cerca banda sup`); }
  else if (bbPct < 0)   { score += 1; sigs.push(`BB ${bbPct.toFixed(0)}% bajo banda inf`); }
  else if (bbPct < 10)  { score += 0.5; sigs.push(`BB ${bbPct.toFixed(0)}% cerca banda inf`); }

  if (!isNaN(ema20) && !isNaN(ema50) && !isNaN(ema200)) {
    if (price < ema20 && ema20 < ema50 && ema50 < ema200)      { score -= 2; sigs.push("EMA bajista completo"); }
    else if (price > ema20 && ema20 > ema50 && ema50 > ema200) { score += 2; sigs.push("EMA alcista completo"); }
    else if (price < ema200 && price < ema50) { score -= 1; sigs.push("Bajo EMA200 y EMA50"); }
    else if (price > ema200 && price > ema50) { score += 1; sigs.push("Sobre EMA200 y EMA50"); }
    else if (price < ema200) score -= 0.5;
    else                     score += 0.5;
  }

  if (volRatio >= 2 && score <= -2) { score -= 1; sigs.push(`Vol ×${volRatio.toFixed(1)} confirma bajada`); }
  if (volRatio >= 2 && score >= 2)  { score += 1; sigs.push(`Vol ×${volRatio.toFixed(1)} confirma subida`); }

  let label, cls;
  if      (score <= -7) [label, cls] = ["SHORT EXTREMO", "se"];
  else if (score <= -4) [label, cls] = ["SHORT FUERTE",  "sf"];
  else if (score <= -2) [label, cls] = ["SHORT",         "sh"];
  else if (score <   0) [label, cls] = ["SHORT DÉBIL",   "sw"];
  else if (score >=  7) [label, cls] = ["LONG EXTREMO",  "le"];
  else if (score >=  4) [label, cls] = ["LONG FUERTE",   "lf"];
  else if (score >=  2) [label, cls] = ["LONG",          "lo"];
  else if (score >   0) [label, cls] = ["LONG DÉBIL",    "lw"];
  else                  [label, cls] = ["NEUTRAL",        "n"];

  const base = symbol.replace("USDT", "");
  return {
    symbol:    symbol.replace("USDT", "/USDT"),
    link:      `https://www.binance.com/es/futures/${base}USDT`,
    price, chg24h: +chg24h.toFixed(2),
    rsi:       +rsiVal.toFixed(1),
    srsi:      +srsiVal.toFixed(1),
    bb_pct:    +bbPct.toFixed(1),
    ema_trend: (!isNaN(ema200) && price > ema200) ? "ALCISTA" : "BAJISTA",
    vol_ratio: +volRatio.toFixed(2),
    atr_pct:   +atrPct.toFixed(2),
    score:     +score.toFixed(1),
    signal: label, cls,
    details: sigs.join(" · ")
  };
}

// ── Binance fetch ─────────────────────────────────────────────────────────────
async function getSymbols() {
  const r = await fetch(`${BINANCE}/fapi/v1/exchangeInfo`);
  const d = await r.json();
  return d.symbols
    .filter(s => s.contractType === "PERPETUAL" && s.quoteAsset === "USDT" && s.status === "TRADING")
    .map(s => s.symbol).sort();
}

async function getKlines(sym, interval, limit = 200) {
  try {
    const r = await fetch(`${BINANCE}/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Screener main ─────────────────────────────────────────────────────────────
async function startScan() {
  if (running) return;
  running = true;
  const btn = document.getElementById("scan-btn");
  const interval = document.getElementById("interval-sel").value;
  btn.disabled = true; btn.textContent = "⏳ Escaneando…";
  showStatus('<span class="spinner"></span> Conectando con Binance…');

  try {
    const symbols = await getSymbols();
    const total = symbols.length;
    document.getElementById("progress-bar-wrap").style.display = "block";

    allData = [];
    const BATCH = 15;

    for (let i = 0; i < symbols.length; i += BATCH) {
      const batch = symbols.slice(i, Math.min(i + BATCH, symbols.length));
      const results = await Promise.all(batch.map(async s => {
        const k = await getKlines(s, interval, 200);
        return analyzeKlines(s, k);
      }));
      allData.push(...results.filter(Boolean));
      const done = Math.min(i + BATCH, total);
      document.getElementById("progress-bar").style.width = (done / total * 100) + "%";
      showStatus(`<span class="spinner"></span> Analizando ${done} / ${total} futuros…`);
      if (i + BATCH < symbols.length) await sleep(150);
    }

    allData.sort((a, b) => a.score - b.score);
    document.getElementById("last-update").textContent =
      "Actualizado: " + new Date().toLocaleTimeString("es-AR");
    document.getElementById("progress-bar-wrap").style.display = "none";
    document.getElementById("status-msg").style.display = "none";
    document.getElementById("table-wrap").style.display = "block";
    updateStats(); applyFilters();
  } catch (e) {
    showStatus("Error: " + e.message);
  }
  running = false;
  btn.disabled = false; btn.textContent = "▶ Re-escanear";
}

// ── Filter / Sort / Render ────────────────────────────────────────────────────
function setFilter(el) {
  document.querySelectorAll(".stat-pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  activeFilter = el.dataset.filter;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById("search-box").value.toLowerCase().trim();
  filtered = allData.filter(r => {
    if (q && !r.symbol.toLowerCase().includes(q)) return false;
    if (activeFilter === "short")   return ["se","sf","sh","sw"].includes(r.cls);
    if (activeFilter === "long")    return ["le","lf","lo","lw"].includes(r.cls);
    if (activeFilter === "neutral") return r.cls === "n";
    return true;
  });
  doSort(); renderTable();
  document.getElementById("count-label").textContent = filtered.length + " resultados";
}

function sortBy(key) {
  sortAsc = sortKey === key ? !sortAsc : true;
  sortKey = key;
  document.querySelectorAll("thead th").forEach(th => th.classList.remove("sorted-asc","sorted-desc"));
  const keys = ["symbol","price","chg24h","score","signal","rsi","srsi","bb_pct","ema_trend","vol_ratio"];
  const idx = keys.indexOf(key);
  if (idx >= 0) document.querySelectorAll("thead th")[idx].classList.add(sortAsc ? "sorted-asc" : "sorted-desc");
  doSort(); renderTable();
}

function doSort() {
  filtered.sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  filtered.forEach(r => {
    const cSign  = r.chg24h >= 0 ? "pos" : "neg";
    const cStr   = (r.chg24h >= 0 ? "+" : "") + r.chg24h.toFixed(2) + "%";
    const emaC   = r.ema_trend === "ALCISTA" ? "ema-up" : "ema-down";
    const emaA   = r.ema_trend === "ALCISTA" ? "↑" : "↓";
    const volStr = r.vol_ratio >= 2 ? `<strong>×${r.vol_ratio}</strong>` : `×${r.vol_ratio}`;
    const sStr   = r.score > 0 ? "+" + r.score : "" + r.score;
    const rCol   = rsiColor(r.rsi), sCol = rsiColor(r.srsi);

    const tr = document.createElement("tr");
    tr.className = r.cls;
    tr.innerHTML = `
      <td><a class="sym-link" href="${r.link}" target="_blank" onclick="event.stopPropagation()">${r.symbol}</a></td>
      <td>${fmtPrice(r.price)}</td>
      <td class="${cSign}">${cStr}</td>
      <td><strong>${sStr}</strong></td>
      <td><span class="badge">${r.signal}</span></td>
      <td>${r.rsi}<span class="rsi-bar"><span class="rsi-fill" style="width:${r.rsi}%;background:${rCol}"></span></span></td>
      <td>${r.srsi}<span class="rsi-bar"><span class="rsi-fill" style="width:${r.srsi}%;background:${sCol}"></span></span></td>
      <td>${r.bb_pct}%</td>
      <td><span class="${emaC}">${emaA} ${r.ema_trend}</span></td>
      <td>${volStr}</td>
      <td title="${r.details}">${r.details}</td>`;

    const dr = document.createElement("tr");
    dr.className = "details-row " + r.cls;
    dr.innerHTML = `<td colspan="11">📊 ${r.details} &nbsp;|&nbsp; ATR: ${r.atr_pct}%</td>`;
    tr.addEventListener("click", () => { dr.style.display = dr.style.display === "table-row" ? "none" : "table-row"; });
    tbody.appendChild(tr); tbody.appendChild(dr);
  });
}

function updateStats() {
  const t = allData.length;
  const s = allData.filter(r => ["se","sf","sh","sw"].includes(r.cls)).length;
  const l = allData.filter(r => ["le","lf","lo","lw"].includes(r.cls)).length;
  const n = allData.filter(r => r.cls === "n").length;
  document.querySelector("[data-filter=all]").textContent     = `TODOS: ${t}`;
  document.querySelector("[data-filter=short]").textContent   = `SHORT: ${s}`;
  document.querySelector("[data-filter=long]").textContent    = `LONG: ${l}`;
  document.querySelector("[data-filter=neutral]").textContent = `NEUTRAL: ${n}`;
}

function showStatus(html) {
  const el = document.getElementById("status-msg");
  el.style.display = "block"; el.innerHTML = html;
}

function fmtPrice(p) {
  if (p >= 1000) return "$" + p.toLocaleString("es-AR", { maximumFractionDigits: 2 });
  if (p >= 1)    return "$" + p.toFixed(4);
  if (p >= 0.001) return "$" + p.toFixed(6);
  return "$" + p.toFixed(8);
}

function rsiColor(v) {
  if (v >= 70) return "#ef4444";
  if (v >= 55) return "#f97316";
  if (v <= 30) return "#22c55e";
  if (v <= 45) return "#84cc16";
  return "#6b7280";
}
</script>
