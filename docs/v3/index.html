<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Screener v3 — Apalancamiento · Binance Futures</title>
<style>
:root {
  --bg:#0b0e14;--surface:#131720;--border:#1e2535;
  --text:#d1d5db;--muted:#6b7280;--accent:#3b82f6;
  --se:#7f1d1d;--se-t:#fca5a5;--sf:#991b1b;--sf-t:#fca5a5;
  --sh:#b91c1c;--sh-t:#fecaca;--sw:#450a0a;--sw-t:#f87171;
  --le:#14532d;--le-t:#86efac;--lf:#166534;--lf-t:#86efac;
  --lo:#15803d;--lo-t:#bbf7d0;--lw:#052e16;--lw-t:#6ee7b7;
  --n:#1e2535;--n-t:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;color:#f9fafb}
header h1 span{color:var(--accent)}
.bv3{background:#7c3aed;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;vertical-align:middle;margin-left:4px}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
select,button{background:#1e2535;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 11px;font-size:13px;cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover{background:#2563eb}
button.primary:disabled{background:#374151;border-color:#374151;cursor:not-allowed}
.last-update{color:var(--muted);font-size:12px}
#progress-bar-wrap{height:3px;background:var(--border);display:none}
#progress-bar{height:3px;background:var(--accent);width:0%;transition:width .2s}
.stats{display:flex;gap:8px;padding:10px 20px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.stat-pill{padding:4px 12px;border-radius:20px;font-weight:600;font-size:12px;cursor:pointer;border:1px solid transparent;user-select:none}
.stat-pill.active{border-color:#fff3}
.pill-all{background:#374151;color:#e5e7eb}.pill-short{background:#7f1d1d;color:#fca5a5}
.pill-long{background:#14532d;color:#86efac}.pill-n{background:#1e2535;color:#9ca3af}
.toolbar{display:flex;align-items:center;gap:12px;padding:8px 20px;border-bottom:1px solid var(--border)}
#search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 12px;font-size:13px;width:200px}
#search-box::placeholder{color:var(--muted)}
.count-label{color:var(--muted);font-size:12px;margin-left:auto}
.hint{color:var(--muted);font-size:11px}
#status-msg{padding:40px;text-align:center;color:var(--muted);font-size:15px}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.main-layout{display:flex;overflow:hidden;height:calc(100vh - 148px)}
.table-wrap{flex:1;overflow:auto;transition:margin-right .3s}
.table-wrap.panel-open{margin-right:460px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{background:#0d1117;position:sticky;top:0;z-index:2;padding:7px 10px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted-asc::after{content:" ▲";color:var(--accent)}
thead th.sorted-desc::after{content:" ▼";color:var(--accent)}
.col-sym{width:105px}.col-price{width:96px}.col-chg{width:66px}.col-score{width:56px}
.col-signal{width:122px}.col-rsi{width:56px}.col-srsi{width:66px}.col-bb{width:58px}
.col-ema{width:76px}.col-vol{width:58px}.col-sl{width:82px}.col-tp{width:82px}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
tbody tr:hover{filter:brightness(1.28)}
tbody tr.selected{outline:2px solid var(--accent);outline-offset:-2px}
tbody td{padding:6px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr.se{background:var(--se);color:var(--se-t)}tr.sf{background:var(--sf);color:var(--sf-t)}
tr.sh{background:var(--sh);color:var(--sh-t)}tr.sw{background:var(--sw);color:var(--sw-t)}
tr.le{background:var(--le);color:var(--le-t)}tr.lf{background:var(--lf);color:var(--lf-t)}
tr.lo{background:var(--lo);color:var(--lo-t)}tr.lw{background:var(--lw);color:var(--lw-t)}
tr.n{background:var(--n);color:var(--n-t)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-weight:700;font-size:11px;background:rgba(0,0,0,.3);color:inherit}
.sym-link{color:inherit;text-decoration:none;font-weight:700}.sym-link:hover{text-decoration:underline}
td.pos{color:#4ade80}td.neg{color:#f87171}
.rsi-bar{width:32px;height:4px;background:#374151;border-radius:2px;display:inline-block;vertical-align:middle;margin-left:3px;overflow:hidden}
.rsi-fill{height:100%;border-radius:2px}
.ema-up{color:#4ade80;font-weight:600}.ema-down{color:#f87171;font-weight:600}
.sl-cell{color:#f87171;font-weight:600}.tp-cell{color:#4ade80;font-weight:600}

/* ── Side panel ─────────────────────────────────────────────────────── */
.side-panel{position:fixed;right:-480px;top:0;height:100vh;width:460px;background:var(--surface);border-left:2px solid var(--border);z-index:50;transition:right .3s ease;overflow-y:auto}
.side-panel.open{right:0}
.panel-header{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px;z-index:1}
.panel-close{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.panel-close:hover{color:var(--text);border-color:var(--text)}
.panel-body{padding:14px 16px}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}

/* ── Leverage calculator ─────────────────────────────────────────────── */
.calc-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.calc-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.calc-label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.calc-input{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:7px 9px;font-size:13px;font-weight:600}
.calc-input:focus{outline:1px solid var(--accent)}
.calc-input.big{font-size:15px;padding:8px 10px}

/* Margin type toggle */
.margin-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:14px}
.margin-btn{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all .15s}
.margin-btn.active{background:var(--accent);color:#fff}
.margin-btn:not(.active):hover{background:#1e2535;color:var(--text)}

/* Position summary */
.pos-summary{background:#0d1117;border-radius:7px;padding:11px 13px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pos-item{font-size:12px}
.pos-item .pl{color:var(--muted);font-size:10px;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.pos-item .pv{font-weight:700;color:#f9fafb}

/* PnL results table */
.pnl-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.pnl-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px}
.pnl-table tr:last-child td{border-bottom:none}
.pnl-label{color:var(--text);font-weight:600;white-space:nowrap}
.pnl-price{text-align:right;font-weight:700;white-space:nowrap}
.pnl-usd{text-align:right;font-size:14px;font-weight:700;white-space:nowrap}
.pnl-roe{text-align:right;font-size:12px;white-space:nowrap}
.row-liq{background:rgba(124,58,237,.12)}
.row-sl{background:rgba(248,113,113,.07)}
.row-tp1{background:rgba(134,239,172,.04)}
.row-tp2{background:rgba(74,222,128,.07)}
.row-tp3{background:rgba(34,197,94,.10)}

/* Price range bar */
.price-bar-wrap{margin:14px 0;padding:0 4px}
.price-bar-label{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.price-bar{position:relative;height:10px;border-radius:5px;background:var(--border);overflow:visible;margin-bottom:18px}
.price-bar-fill{position:absolute;top:0;height:100%;border-radius:5px}
.price-bar-tick{position:absolute;top:-3px;width:3px;height:16px;border-radius:2px;transform:translateX(-50%)}
.price-bar-tick-label{position:absolute;top:14px;font-size:9px;transform:translateX(-50%);white-space:nowrap;color:var(--muted)}

/* Warning boxes */
.warn-box{border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.5;margin-top:10px}
.warn-isolated{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd}
.warn-cross{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:#fcd34d}
.warn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}

.open-btn{display:block;text-align:center;background:var(--accent);color:#fff;padding:10px;border-radius:6px;text-decoration:none;font-weight:700;margin-top:14px}
.open-btn:hover{background:#2563eb}
</style>

<body>

<header>
  <h1>Crypto <span>Screener</span><span class="bv3">v3</span></h1>
  <div class="controls">
    <label style="color:var(--muted);font-size:12px">Temporalidad:</label>
    <select id="interval-sel">
      <option value="15m">15 minutos</option>
      <option value="1h" selected>1 hora</option>
      <option value="4h">4 horas</option>
      <option value="1d">Diario</option>
    </select>
    <label style="color:var(--muted);font-size:12px">SL (ATR ×)</label>
    <select id="atr-mult">
      <option value="1.5">1.5</option>
      <option value="2.0" selected>2.0</option>
      <option value="3.0">3.0</option>
    </select>
    <button class="primary" id="scan-btn" onclick="startScan()">▶ Escanear</button>
    <span class="last-update" id="last-update"></span>
    <a href="../v2/" style="color:var(--muted);font-size:12px;text-decoration:none">← v2</a>
  </div>
</header>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div class="stats">
  <span class="stat-pill pill-all active" data-filter="all"     onclick="setFilter(this)">TODOS: 0</span>
  <span class="stat-pill pill-short"      data-filter="short"   onclick="setFilter(this)">SHORT: 0</span>
  <span class="stat-pill pill-long"       data-filter="long"    onclick="setFilter(this)">LONG: 0</span>
  <span class="stat-pill pill-n"          data-filter="neutral" onclick="setFilter(this)">NEUTRAL: 0</span>
</div>

<div class="toolbar">
  <input id="search-box" type="text" placeholder="Buscar símbolo…" oninput="applyFilters()">
  <span class="hint">Click en una fila → calculadora de apalancamiento</span>
  <span class="count-label" id="count-label">0 resultados</span>
</div>

<div id="status-msg">Presioná <strong>Escanear</strong> para analizar todos los futuros de Binance.</div>

<div class="main-layout" id="main-layout" style="display:none">
  <div class="table-wrap" id="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-sym"    onclick="sortBy('symbol')">Símbolo</th>
          <th class="col-price"  onclick="sortBy('price')">Precio</th>
          <th class="col-chg"    onclick="sortBy('chg24h')">24h %</th>
          <th class="col-score"  onclick="sortBy('score')">Score</th>
          <th class="col-signal" onclick="sortBy('signal')">Señal</th>
          <th class="col-rsi"    onclick="sortBy('rsi')">RSI</th>
          <th class="col-srsi"   onclick="sortBy('srsi')">StochRSI</th>
          <th class="col-bb"     onclick="sortBy('bb_pct')">BB %</th>
          <th class="col-ema"    onclick="sortBy('ema_trend')">EMA</th>
          <th class="col-vol"    onclick="sortBy('vol_ratio')">Vol×</th>
          <th class="col-sl"     onclick="sortBy('sl_pct')">SL %</th>
          <th class="col-tp"     onclick="sortBy('tp2_pct')">TP2 %</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- Side Panel -->
<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <div id="panel-title" style="font-weight:700;font-size:15px;color:#f9fafb;flex:1">—</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
const BINANCE = "https://fapi.binance.com";
let allData=[], filtered=[], sortKey="score", sortAsc=true;
let activeFilter="all", running=false, selectedSym=null;
let currentTPSL=null, currentR=null;
let marginType="isolated";
const klinesCache = new Map();

// ── Math helpers ───────────────────────────────────────────────────────────────
const wilderEMA=(arr,p)=>{if(arr.length<p)return NaN;let v=arr.slice(0,p).reduce((a,b)=>a+b)/p;const a=1/p;for(let i=p;i<arr.length;i++)v=v*(1-a)+arr[i]*a;return v;};
const stdEMA=(arr,p)=>{if(arr.length<p)return NaN;const a=2/(p+1);let v=arr.slice(0,p).reduce((a,b)=>a+b)/p;for(let i=p;i<arr.length;i++)v=arr[i]*a+v*(1-a);return v;};
function stdEMAFull(arr,p){if(arr.length<p)return arr.map(()=>NaN);const a=2/(p+1);const out=new Array(p-1).fill(NaN);let v=arr.slice(0,p).reduce((s,x)=>s+x)/p;out.push(v);for(let i=p;i<arr.length;i++){v=arr[i]*a+v*(1-a);out.push(v);}return out;}

function rsiSeries(closes,p=14){const g=[],l=[];for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1];g.push(d>0?d:0);l.push(d<0?-d:0);}if(g.length<p)return[];const a=1/p;let ag=g.slice(0,p).reduce((s,x)=>s+x)/p,al=l.slice(0,p).reduce((s,x)=>s+x)/p;const out=[al===0?100:100-100/(1+ag/al)];for(let i=p;i<g.length;i++){ag=ag*(1-a)+g[i]*a;al=al*(1-a)+l[i]*a;out.push(al===0?100:100-100/(1+ag/al));}return out;}

function calcStochRSI(closes,rP=14,stP=14,sk=3){const rs=rsiSeries(closes,rP);if(rs.length<stP+sk)return 50;const raw=[];for(let i=stP-1;i<rs.length;i++){const w=rs.slice(i-stP+1,i+1);const lo=Math.min(...w),hi=Math.max(...w);raw.push(hi===lo?50:(rs[i]-lo)/(hi-lo)*100);}if(raw.length<sk)return 50;let k=0;for(let i=raw.length-sk;i<raw.length;i++)k+=raw[i];return k/sk;}

function calcMACD(closes){const fast=stdEMAFull(closes,12),slow=stdEMAFull(closes,26);const macd=fast.map((v,i)=>(isNaN(v)||isNaN(slow[i]))?NaN:v-slow[i]);const valid=macd.filter(v=>!isNaN(v));if(valid.length<9)return{histCur:0,histPrv:0};const sig=stdEMAFull(valid,9);const hist=sig.map((v,i)=>isNaN(v)?NaN:valid[i]-v).filter(v=>!isNaN(v));return{histCur:hist[hist.length-1]??0,histPrv:hist[hist.length-2]??0};}

function calcBB(closes,p=20){if(closes.length<p)return 50;const sl=closes.slice(-p);const mean=sl.reduce((a,b)=>a+b)/p;const std=Math.sqrt(sl.reduce((s,v)=>s+(v-mean)**2,0)/p);const up=mean+2*std,lo=mean-2*std,price=closes[closes.length-1];return up===lo?50:(price-lo)/(up-lo)*100;}

function calcATR(highs,lows,closes,p=14){const trs=[];for(let i=1;i<closes.length;i++)trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));return wilderEMA(trs,p);}

// ── TP/SL ──────────────────────────────────────────────────────────────────────
function calcTPSL(r, klines, atrMult) {
  if (!klines||klines.length<30) return null;
  const closes=klines.map(k=>+k[4]),highs=klines.map(k=>+k[2]),lows=klines.map(k=>+k[3]);
  const price=closes[closes.length-1];
  const atr=calcATR(highs,lows,closes,14);
  if(isNaN(atr)) return null;
  const slDist=atr*atrMult;
  const isShort=["se","sf","sh","sw"].includes(r.cls);
  const isActionable=isShort||["le","lf","lo","lw"].includes(r.cls);
  if(!isActionable) return null;
  const dir=isShort?1:-1;
  const sl=price+dir*slDist,tp1=price-dir*slDist,tp2=price-dir*slDist*2,tp3=price-dir*slDist*3;
  const last20H=Math.max(...highs.slice(-20)),last20L=Math.min(...lows.slice(-20));
  const slSwing=isShort?last20H*1.003:last20L*0.997;
  const pct=(v,b)=>+((v-b)/b*100).toFixed(2);
  return {
    isShort,entry:price,atr,slDist,
    sl,slPct:pct(sl,price),
    tp1,tp1Pct:pct(tp1,price),
    tp2,tp2Pct:pct(tp2,price),
    tp3,tp3Pct:pct(tp3,price),
    slSwing,slSwingPct:pct(slSwing,price),
  };
}

// ── Maintenance Margin Rate by leverage ───────────────────────────────────────
function getMMR(lev) {
  if(lev<=10) return 0.004;
  if(lev<=25) return 0.005;
  if(lev<=50) return 0.0065;
  if(lev<=75) return 0.01;
  if(lev<=100) return 0.025;
  return 0.05; // 125x
}

// ── Leverage PnL & Liquidation ────────────────────────────────────────────────
function calcLeverage(tpsl, margin, leverage, mType) {
  if(!tpsl||!margin||!leverage) return null;
  const posSize  = margin * leverage;
  const qty      = posSize / tpsl.entry;
  const mmr      = getMMR(leverage);
  const imr      = 1 / leverage;
  const {isShort,entry,sl,tp1,tp2,tp3} = tpsl;

  // PnL = qty × |exit - entry| (direction-aware)
  const pnl = (exit) => isShort ? qty*(entry-exit) : qty*(exit-entry);

  const slPnL  = pnl(sl);
  const tp1PnL = pnl(tp1);
  const tp2PnL = pnl(tp2);
  const tp3PnL = pnl(tp3);

  // Cap isolated loss at -margin
  const effSlPnL = mType==="isolated" ? Math.max(slPnL,-margin) : slPnL;

  // ROE = PnL / margin × 100
  const roe = v => +(v/margin*100).toFixed(1);

  // Liquidation price (isolated formula, Binance-style)
  // Long: Liq = Entry × (1 - IMR + MMR)
  // Short: Liq = Entry × (1 + IMR - MMR)
  let liqPrice;
  if(!isShort) liqPrice = entry*(1-imr+mmr);
  else         liqPrice = entry*(1+imr-mmr);
  const liqPct = +((liqPrice-entry)/entry*100).toFixed(2);

  // Distance from entry to liquidation (in $ per coin)
  const liqDistPct = Math.abs((liqPrice-entry)/entry*100);
  const slDistPct  = Math.abs((sl-entry)/entry*100);
  const slSafe     = liqDistPct > slDistPct; // SL triggers before liquidation

  return {
    posSize, qty, mmr, liqPrice, liqPct, liqDistPct, slDistPct, slSafe,
    slPnL:effSlPnL,  slROE:roe(effSlPnL),
    tp1PnL, tp1ROE:roe(tp1PnL),
    tp2PnL, tp2ROE:roe(tp2PnL),
    tp3PnL, tp3ROE:roe(tp3PnL),
  };
}

// ── Analysis ───────────────────────────────────────────────────────────────────
function analyzeKlines(symbol, klines, atrMult) {
  if(!klines||klines.length<60) return null;
  const closes=klines.map(k=>+k[4]),highs=klines.map(k=>+k[2]),lows=klines.map(k=>+k[3]),volumes=klines.map(k=>+k[5]);
  const price=closes[closes.length-1];
  const rs=rsiSeries(closes);
  const rsiVal=rs[rs.length-1]??50;
  const srsiVal=calcStochRSI(closes);
  const{histCur,histPrv}=calcMACD(closes);
  const bbPct=calcBB(closes);
  const ema20=stdEMA(closes,20),ema50=stdEMA(closes,50),ema200=stdEMA(closes,200);
  const atrVal=calcATR(highs,lows,closes);
  const atrPct=isNaN(atrVal)?0:atrVal/price*100;
  const volAvg=volumes.slice(-20).reduce((a,b)=>a+b)/20;
  const volRatio=volumes[volumes.length-1]/volAvg;
  const lb=Math.min(24,closes.length-1);
  const chg24h=(price-closes[closes.length-1-lb])/closes[closes.length-1-lb]*100;

  let score=0;const sigs=[];
  if(rsiVal>=80){score-=2;sigs.push(`RSI ${rsiVal.toFixed(1)} extremo alto`);}
  else if(rsiVal>=70){score-=1;sigs.push(`RSI ${rsiVal.toFixed(1)} sobrecompra`);}
  else if(rsiVal<=20){score+=2;sigs.push(`RSI ${rsiVal.toFixed(1)} extremo bajo`);}
  else if(rsiVal<=30){score+=1;sigs.push(`RSI ${rsiVal.toFixed(1)} sobreventa`);}
  else sigs.push(`RSI ${rsiVal.toFixed(1)}`);
  if(!isNaN(srsiVal)){
    if(srsiVal>=90){score-=2;sigs.push(`StochRSI ${srsiVal.toFixed(1)} extremo alto`);}
    else if(srsiVal>=80){score-=1;sigs.push(`StochRSI ${srsiVal.toFixed(1)} sobrecompra`);}
    else if(srsiVal<=10){score+=2;sigs.push(`StochRSI ${srsiVal.toFixed(1)} extremo bajo`);}
    else if(srsiVal<=20){score+=1;sigs.push(`StochRSI ${srsiVal.toFixed(1)} sobreventa`);}
    else sigs.push(`StochRSI ${srsiVal.toFixed(1)}`);
  }
  if(histCur<0&&histPrv>=0){score-=2;sigs.push("MACD cruce bajista");}
  else if(histCur>0&&histPrv<=0){score+=2;sigs.push("MACD cruce alcista");}
  else if(histCur<0&&histCur<histPrv){score-=1;sigs.push("MACD empeorando");}
  else if(histCur>0&&histCur>histPrv){score+=1;sigs.push("MACD mejorando");}
  else if(histCur<0)score-=0.5;else score+=0.5;
  if(bbPct>100){score-=1;sigs.push(`BB ${bbPct.toFixed(0)}% sobre banda sup`);}
  else if(bbPct>90){score-=0.5;sigs.push(`BB ${bbPct.toFixed(0)}% cerca banda sup`);}
  else if(bbPct<0){score+=1;sigs.push(`BB ${bbPct.toFixed(0)}% bajo banda inf`);}
  else if(bbPct<10){score+=0.5;sigs.push(`BB ${bbPct.toFixed(0)}% cerca banda inf`);}
  if(!isNaN(ema20)&&!isNaN(ema50)&&!isNaN(ema200)){
    if(price<ema20&&ema20<ema50&&ema50<ema200){score-=2;sigs.push("EMA bajista completo");}
    else if(price>ema20&&ema20>ema50&&ema50>ema200){score+=2;sigs.push("EMA alcista completo");}
    else if(price<ema200&&price<ema50){score-=1;sigs.push("Bajo EMA200 y EMA50");}
    else if(price>ema200&&price>ema50){score+=1;sigs.push("Sobre EMA200 y EMA50");}
    else if(price<ema200)score-=0.5;else score+=0.5;
  }
  if(volRatio>=2&&score<=-2){score-=1;sigs.push(`Vol ×${volRatio.toFixed(1)} confirma bajada`);}
  if(volRatio>=2&&score>=2){score+=1;sigs.push(`Vol ×${volRatio.toFixed(1)} confirma subida`);}

  let label,cls;
  if(score<=-7)[label,cls]=["SHORT EXTREMO","se"];
  else if(score<=-4)[label,cls]=["SHORT FUERTE","sf"];
  else if(score<=-2)[label,cls]=["SHORT","sh"];
  else if(score<0)[label,cls]=["SHORT DÉBIL","sw"];
  else if(score>=7)[label,cls]=["LONG EXTREMO","le"];
  else if(score>=4)[label,cls]=["LONG FUERTE","lf"];
  else if(score>=2)[label,cls]=["LONG","lo"];
  else if(score>0)[label,cls]=["LONG DÉBIL","lw"];
  else[label,cls]=["NEUTRAL","n"];

  const isShort=["se","sf","sh","sw"].includes(cls),isLong=["le","lf","lo","lw"].includes(cls);
  const slDist=atrVal*atrMult;
  const sl_pct=isShort?+(slDist/price*100).toFixed(2):isLong?-(slDist/price*100).toFixed(2):null;
  const tp2_pct=isShort?-(slDist*2/price*100).toFixed(2):isLong?+(slDist*2/price*100).toFixed(2):null;

  const base=symbol.replace("USDT","");
  return {
    symbol:symbol.replace("USDT","/USDT"),
    link:`https://www.binance.com/es/futures/${base}USDT`,
    price,chg24h:+chg24h.toFixed(2),
    rsi:+rsiVal.toFixed(1),srsi:+srsiVal.toFixed(1),
    bb_pct:+bbPct.toFixed(1),
    ema_trend:(!isNaN(ema200)&&price>ema200)?"ALCISTA":"BAJISTA",
    vol_ratio:+volRatio.toFixed(2),atr_pct:+atrPct.toFixed(2),
    score:+score.toFixed(1),signal:label,cls,
    sl_pct,tp2_pct,details:sigs.join(" · ")
  };
}

// ── Binance API ────────────────────────────────────────────────────────────────
async function getSymbols(){const r=await fetch(`${BINANCE}/fapi/v1/exchangeInfo`);const d=await r.json();return d.symbols.filter(s=>s.contractType==="PERPETUAL"&&s.quoteAsset==="USDT"&&s.status==="TRADING").map(s=>s.symbol).sort();}
async function getKlines(sym,interval,limit=200){try{const r=await fetch(`${BINANCE}/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(!r.ok)return null;return await r.json();}catch{return null;}}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ── Screener ───────────────────────────────────────────────────────────────────
async function startScan() {
  if(running)return;
  running=true;
  const btn=document.getElementById("scan-btn");
  const interval=document.getElementById("interval-sel").value;
  const atrMult=parseFloat(document.getElementById("atr-mult").value);
  btn.disabled=true;btn.textContent="⏳ Escaneando…";
  showStatus('<span class="spinner"></span> Conectando con Binance…');
  try{
    const symbols=await getSymbols();
    const total=symbols.length;
    document.getElementById("progress-bar-wrap").style.display="block";
    allData=[];klinesCache.clear();
    const BATCH=15;
    for(let i=0;i<symbols.length;i+=BATCH){
      const batch=symbols.slice(i,Math.min(i+BATCH,symbols.length));
      const results=await Promise.all(batch.map(async s=>{
        const k=await getKlines(s,interval,200);
        if(k)klinesCache.set(s,k);
        return analyzeKlines(s,k,atrMult);
      }));
      allData.push(...results.filter(Boolean));
      const done=Math.min(i+BATCH,total);
      document.getElementById("progress-bar").style.width=(done/total*100)+"%";
      showStatus(`<span class="spinner"></span> Analizando ${done} / ${total} futuros…`);
      if(i+BATCH<symbols.length)await sleep(150);
    }
    allData.sort((a,b)=>a.score-b.score);
    document.getElementById("last-update").textContent="Actualizado: "+new Date().toLocaleTimeString("es-AR");
    document.getElementById("progress-bar-wrap").style.display="none";
    document.getElementById("status-msg").style.display="none";
    document.getElementById("main-layout").style.display="flex";
    updateStats();applyFilters();
  }catch(e){showStatus("Error: "+e.message);}
  running=false;btn.disabled=false;btn.textContent="▶ Re-escanear";
}

// ── Filter / Sort / Render ─────────────────────────────────────────────────────
function setFilter(el){document.querySelectorAll(".stat-pill").forEach(p=>p.classList.remove("active"));el.classList.add("active");activeFilter=el.dataset.filter;applyFilters();}
function applyFilters(){const q=document.getElementById("search-box").value.toLowerCase().trim();filtered=allData.filter(r=>{if(q&&!r.symbol.toLowerCase().includes(q))return false;if(activeFilter==="short")return["se","sf","sh","sw"].includes(r.cls);if(activeFilter==="long")return["le","lf","lo","lw"].includes(r.cls);if(activeFilter==="neutral")return r.cls==="n";return true;});doSort();renderTable();document.getElementById("count-label").textContent=filtered.length+" resultados";}
function sortBy(key){sortAsc=sortKey===key?!sortAsc:true;sortKey=key;document.querySelectorAll("thead th").forEach(th=>th.classList.remove("sorted-asc","sorted-desc"));const keys=["symbol","price","chg24h","score","signal","rsi","srsi","bb_pct","ema_trend","vol_ratio","sl_pct","tp2_pct"];const idx=keys.indexOf(key);if(idx>=0)document.querySelectorAll("thead th")[idx].classList.add(sortAsc?"sorted-asc":"sorted-desc");doSort();renderTable();}
function doSort(){filtered.sort((a,b)=>{const va=a[sortKey]??0,vb=b[sortKey]??0;if(typeof va==="string")return sortAsc?va.localeCompare(vb):vb.localeCompare(va);return sortAsc?va-vb:vb-va;});}

function renderTable(){
  const tbody=document.getElementById("table-body");tbody.innerHTML="";
  filtered.forEach(r=>{
    const cS=r.chg24h>=0?"pos":"neg";const cStr=(r.chg24h>=0?"+":"")+r.chg24h.toFixed(2)+"%";
    const eC=r.ema_trend==="ALCISTA"?"ema-up":"ema-down";const eA=r.ema_trend==="ALCISTA"?"↑":"↓";
    const rC=rsiColor(r.rsi),sC=rsiColor(r.srsi);
    const isS=["se","sf","sh","sw"].includes(r.cls);
    const slStr=r.sl_pct!=null?(isS?"+":"")+r.sl_pct+"%":"—";
    const tp2Str=r.tp2_pct!=null?(r.tp2_pct>0?"+":"")+r.tp2_pct+"%":"—";
    const tr=document.createElement("tr");tr.className=r.cls;
    if(r.symbol===selectedSym)tr.classList.add("selected");
    tr.innerHTML=`
      <td><a class="sym-link" href="${r.link}" target="_blank" onclick="event.stopPropagation()">${r.symbol}</a></td>
      <td>${fmtPrice(r.price)}</td><td class="${cS}">${cStr}</td>
      <td><strong>${r.score>0?"+"+r.score:r.score}</strong></td>
      <td><span class="badge">${r.signal}</span></td>
      <td>${r.rsi}<span class="rsi-bar"><span class="rsi-fill" style="width:${r.rsi}%;background:${rC}"></span></span></td>
      <td>${r.srsi}<span class="rsi-bar"><span class="rsi-fill" style="width:${r.srsi}%;background:${sC}"></span></span></td>
      <td>${r.bb_pct}%</td>
      <td><span class="${eC}">${eA} ${r.ema_trend}</span></td>
      <td>${r.vol_ratio>=2?"<strong>×"+r.vol_ratio+"</strong>":"×"+r.vol_ratio}</td>
      <td class="sl-cell">${slStr}</td><td class="tp-cell">${tp2Str}</td>`;
    tr.addEventListener("click",()=>openPanel(r));
    tbody.appendChild(tr);
  });
}
function updateStats(){const t=allData.length,s=allData.filter(r=>["se","sf","sh","sw"].includes(r.cls)).length,l=allData.filter(r=>["le","lf","lo","lw"].includes(r.cls)).length,n=allData.filter(r=>r.cls==="n").length;document.querySelector("[data-filter=all]").textContent=`TODOS: ${t}`;document.querySelector("[data-filter=short]").textContent=`SHORT: ${s}`;document.querySelector("[data-filter=long]").textContent=`LONG: ${l}`;document.querySelector("[data-filter=neutral]").textContent=`NEUTRAL: ${n}`;}

// ── Panel ──────────────────────────────────────────────────────────────────────
function openPanel(r){
  selectedSym=r.symbol;renderTable();
  const sym=r.symbol.replace("/USDT","USDT");
  const klines=klinesCache.get(sym);
  const atrMult=parseFloat(document.getElementById("atr-mult").value);
  currentTPSL=calcTPSL(r,klines,atrMult);
  currentR=r;
  document.getElementById("panel-title").textContent=r.symbol;
  document.getElementById("panel-body").innerHTML=buildPanel(r,currentTPSL);
  document.getElementById("side-panel").classList.add("open");
  document.getElementById("table-wrap").classList.add("panel-open");
  refreshCalc();
}
function closePanel(){selectedSym=null;document.getElementById("side-panel").classList.remove("open");document.getElementById("table-wrap").classList.remove("panel-open");renderTable();}

function setMarginType(type){
  marginType=type;
  document.querySelectorAll(".margin-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+type).classList.add("active");
  refreshCalc();
}

function refreshCalc(){
  if(!currentTPSL||!currentR)return;
  const margin=parseFloat(document.getElementById("lev-margin")?.value||20);
  const leverage=parseInt(document.getElementById("lev-leverage")?.value||10);
  const lev=calcLeverage(currentTPSL,margin,leverage,marginType);
  if(!lev)return;
  renderLevResults(lev,currentTPSL,margin,leverage);
}

    } else {
      mn.innerHTML=`<div class="warn-box warn-cross">🔄 <strong>Margen cruzado:</strong> Binance puede usar todo tu balance para evitar la liquidación. Si el mercado va en tu contra, podés perder <strong>más que el margen</strong> depositado. El precio de liquidación mostrado es estimado.</div>`;

function buildPriceBar(tpsl, lev) {
  const cont = document.getElementById("price-bar-container");
  if (!cont) return;

  // Collect all price levels
  const prices = [lev.liqPrice, tpsl.sl, tpsl.entry, tpsl.tp1, tpsl.tp2, tpsl.tp3];
  const minP = Math.min(...prices) * 0.999;
  const maxP = Math.max(...prices) * 1.001;
  const range = maxP - minP;
  const pct = p => ((p - minP) / range * 100).toFixed(1);

  const ticks = [
    { price: lev.liqPrice, color: "#c084fc", label: "LIQ", short: true },
    { price: tpsl.sl,      color: "#f87171", label: "SL",  short: false },
    { price: tpsl.entry,   color: "#60a5fa", label: "EN",  short: false },
    { price: tpsl.tp1,     color: "#86efac", label: "TP1", short: false },
    { price: tpsl.tp2,     color: "#4ade80", label: "TP2", short: false },
    { price: tpsl.tp3,     color: "#22c55e", label: "TP3", short: false },
  ];

  const ticksHTML = ticks.map(t => `
    <div class="price-bar-tick" style="left:${pct(t.price)}%;background:${t.color}"></div>
    <div class="price-bar-tick-label" style="left:${pct(t.price)}%;color:${t.color}">${t.label}</div>
  `).join("");

  // Gradient fill between liq and tp3
  const isShort = tpsl.isShort;
  const liqPct = pct(lev.liqPrice);
  const entryPct = pct(tpsl.entry);
  const tp3Pct = pct(tpsl.tp3);
  const slPct = pct(tpsl.sl);

  cont.innerHTML = `
    <div class="price-bar-label">Escala de precios</div>
    <div class="price-bar" style="margin-bottom:28px">
      <div class="price-bar-fill" style="left:${Math.min(liqPct,entryPct)}%;width:${Math.abs(entryPct-liqPct)}%;background:rgba(248,113,113,.35)"></div>
      <div class="price-bar-fill" style="left:${Math.min(entryPct,tp3Pct)}%;width:${Math.abs(tp3Pct-entryPct)}%;background:rgba(74,222,128,.25)"></div>
      ${ticksHTML}
    </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function showStatus(html){const el=document.getElementById("status-msg");el.style.display="block";el.innerHTML=html;}
function fmtPrice(p){if(p>=1000)return"$"+p.toLocaleString("es-AR",{maximumFractionDigits:2});if(p>=1)return"$"+p.toFixed(4);if(p>=0.001)return"$"+p.toFixed(6);return"$"+p.toFixed(8);}
function rsiColor(v){if(v>=70)return"#ef4444";if(v>=55)return"#f97316";if(v<=30)return"#22c55e";if(v<=45)return"#84cc16";return"#6b7280";}
</script>
